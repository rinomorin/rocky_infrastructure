---
# -------------------------------------------------------------------------
# 1. PRE-CHECK & CLEANUP (Conditional on 'new-image' tag or force_new_image)
# -------------------------------------------------------------------------
- name: Check if golden-base already exists on KVM host
  shell: "sudo virsh list --all | grep -q '{{ vm_host }}' && echo 'exists' || echo 'notfound'"
  register: vm_check
  delegate_to: "{{ VM_HOST_IP }}"
  changed_when: false

- name: Wipe existing golden-base if 'new-image' is requested
  delegate_to: "{{ VM_HOST_IP }}"
  block:
    - name: Destroy and Undefine existing golden-base
      shell: |
        # Only run if the domain actually exists in virsh
        if sudo virsh list --all | grep -q "{{ vm_host }}"; then
          sudo virsh destroy {{ vm_host }} || true
          sudo virsh undefine {{ vm_host }} --remove-all-storage
        fi
      register: wipe_out
      # This ensures it only runs if force_new_image is true OR the user passed --tags new-image
      when: >
        (force_new_image | default(false) | bool) or 
        ('new-image' in ansible_run_tags)

    - name: Set existing_vms fact based on check and wipe
      set_fact:
        existing_vms: >-
          {{ 
            'exists' in vm_check.stdout and 
            not ((force_new_image | default(false)) or ('new-image' in ansible_run_tags)) 
          }}

# -------------------------------------------------------------------------
# 2. FILE PREPARATION (Permissions & Kickstart)
# -------------------------------------------------------------------------
- name: Ensure Local ISO is readable by QEMU (using sudo shell)
  delegate_to: "{{ VM_HOST_IP }}"
  become: false  # Do not use Ansible become
  shell: |
    # We use sudo directly in the shell string
    sudo chown qemu:qemu "{{ iso_path }}"
    sudo chmod 0644 "{{ iso_path }}"
    # Verify the path is accessible to the hypervisor
    sudo ls -la "{{ iso_path }}"
  when: not existing_vms
  register: iso_perms

- debug:
    msg: "show ssh key being used: {{ core_ssh_key }}" 

- name: Generate Kickstart from template for golden-base
  template:
    src: "golden.ks.j2"
    dest: "/home/{{ cloud_helper_user }}/{{ vm_host }}.ks"
    force: true
  vars:
    hostname: "{{ vm_host }}.{{ cloud_zone }}"
    rawcore_ssh_key: "{{ core_ssh_key }}" # Pulled from defaults/env lookup
    my_os_variant: "{{ tos_variant }}"
    crio_repo_ver: "{{ crio_version }}"
    kubernetes_repo_ver: "{{ kubernetes_version }}"
    install_disk: "sda"
  when: not existing_vms

# -------------------------------------------------------------------------
# 3. VM INSTALLATION
# -------------------------------------------------------------------------
- name: Execute virt-install (Baking the Golden Image)
  delegate_to: "{{ VM_HOST_IP }}"
  become: true
  command: >
    sudo virt-install
      --name {{ vm_host }}
      --ram {{ tram_size }}
      --vcpus {{ tcpu_count }}
      --initrd-inject="/home/{{ cloud_helper_user }}/{{ vm_host }}.ks"
      --extra-args="inst.ks=file:/{{ vm_host }}.ks console=ttyS0,115200n8"
      --disk path=/var/lib/libvirt/images/{{ vm_host }}.qcow2,size={{ tdisk_size }},bus=sata
      --os-variant {{ tos_name }}{{ tos_variant.split('.')[0] }}
      --location {{ iso_path }}
      {{ '--network network=br-nat,mac=' ~ nat_mac_device if nat_mac_device is defined else '--network network=br-nat' }}
      --network network=br-cluster
      {{ '--network network=default' if ('control_nodes' in group_names or 'kvm' in group_names) else '' }}
      --graphics none
      --console pty,target_type=serial
      --noautoconsole
      --noreboot
      --wait=-1
  when: not existing_vms

# -------------------------------------------------------------------------
# 4. EXTERNAL METADATA (Searchable without booting)
# -------------------------------------------------------------------------
- name: Stamp Golden Image XML with Build Metadata
  delegate_to: "{{ VM_HOST_IP }}"
  shell: |
    # Add human-readable description to the XML
    sudo virt-xml {{ vm_host }} --edit --metadata \
      description="Build: {{ build_timestamp }} | K8s: {{ kubernetes_version }} | CRI-O: {{ crio_version }}"
    
    # Add machine-readable XML block for custom querying
    sudo virsh metadata {{ vm_host }} --uri "http://ansible.lab/metadata" \
      --key "build_info" \
      --set "<build><version>{{ build_timestamp }}</version><k8s>{{ kubernetes_version }}</k8s><crio>{{ crio_version }}</crio></build>"
  when: not existing_vms
  failed_when: false