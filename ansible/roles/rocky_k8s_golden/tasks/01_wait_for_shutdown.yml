---
- name: Calculate wait time in minutes
  set_fact:
    wait_time_to_shutdown_or_fail: "{{ ((build_loops | int) * 10 // 60) }}"

- name: Display wait time
  debug:
    msg: "Probe VM will wait up to {{ wait_time_to_shutdown_or_fail }} minutes before resuming to next tasks"

- name: Probe VM with virsh until VM powers down
  shell: |
    sudo virsh list --all | sed 's/shut off/shutdown/' | grep -i "^.*{{ vm_host }}.*" | awk '{print $NF}'
  register: vm_state
  delegate_to: "{{ VM_HOST_IP }}"
  failed_when: false
  changed_when: false
  until: vm_state.stdout_lines[-1] == "shutdown"
  retries: "{{ build_loops|int }}"
  delay: 10

- name: Sysprep the Master (On Hypervisor)
  delegate_to: "{{ VM_HOST_IP }}"
  become: true
  shell: |
    # We run this on the KVM host while the VM is OFF
    virt-sysprep -d {{ vm_host }} \
      --operations machine-id,net-hostname,net-hwaddr,ssh-hostkeys,customize \
      --hostname {{ vm_host }}


- name: Record Build Completion
  debug:
    msg: "Golden Base Version {{ build_timestamp }} is now offline and ready."


