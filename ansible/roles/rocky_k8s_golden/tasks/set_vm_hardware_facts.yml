---
- name: Detect Local OS ID (e.g., rocky, rhel, fedora)
  delegate_to: localhost
  become: false
  shell: |
    grep '^ID=' /etc/os-release | cut -d= -f2 | tr -d '"'
  register: local_os_id
  changed_when: false

- name: Detect Local OS Version (e.g., 9.4)
  delegate_to: localhost
  become: false
  shell: |
    grep '^VERSION_ID=' /etc/os-release | cut -d= -f2 | tr -d '"'
  register: local_os_version
  changed_when: false

- name: Set VM Hardware and OS Facts
  set_fact:
    # Use Detected OS or fallback to defaults from defaults/main.yml
    tos_name: "{{ local_os_id.stdout | default('rocky', true) }}"
    tos_variant: "{{ local_os_version.stdout | default('9.7', true) }}"
    
    # Disk and RAM (Pulled from Env or Defaults)
    tdisk_size: "{{ lookup('env', 'VM_DISK') | default(50, true) }}"
    tcpu_count: "{{ lookup('env', 'VM_CPUS') | default(2, true) }}"
    tram_size: "{{ lookup('env', 'VM_RAM') | default(4096, true) }}"
    
    # Storage Group Naming
    tvg_name: "vg_golden_base"
    tvg_short: "golden"

- name: Debug Hardware Profile
  debug:
    msg: 
      - "Target OS: {{ tos_name }}{{ tos_variant.split('.')[0] }}"
      - "CPU: {{ tcpu_count }} | RAM: {{ tram_size }}MB | Disk: {{ tdisk_size }}GB"