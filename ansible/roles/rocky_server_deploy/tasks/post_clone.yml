- name: "Connectivity Check: SSH Probe and FIPS Enablement for {{ guest_member }}"
  become: false
  delegate_to: localhost
  ansible.builtin.shell: |
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
    -o BatchMode=yes -o ConnectTimeout=5 -i .ssh/id_rsa \
    core@{{ guest_configs[guest_member].interfaces[pro_seg].ip }} "
      if ! fips-mode-setup --check | grep -q 'is enabled'; then
        sudo fips-mode-setup --enable && sudo reboot
      else
        echo 'FIPS already enabled'
      fi
    "
  register: live_check
  # We expect the connection to drop on reboot, so we ignore failures
  failed_when: false
  changed_when: "'FIPS already enabled' not in live_check.stdout"

- name: Wait for {{ guest_member }} to return after FIPS reboot
  ansible.builtin.wait_for:
    host: "{{ guest_configs[guest_member].interfaces[pro_seg].ip }}"
    port: 22
    delay: 10
    timeout: 300
  delegate_to: localhost