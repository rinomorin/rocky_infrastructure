---

- name: Render kubeadm init config locally
  when: "'control_nodes' in group_names"
  delegate_to: localhost
  template:
    src: kubeadm-init.yaml.j2
    dest: "/tmp/{{ inventory_hostname_short }}-kubeadm-init.yaml"
    mode: "0644"
  register: rendered_init

- name: Render kubeadm-join.yaml
  template:
    src: kubeadm-join.yaml.j2
    dest: "/tmp/{{ inventory_hostname_short }}-kubeadm-join.yaml"
  register: rendered_join

# ------------------------------------------------------------
# Render kubeadm-join.yaml locally for worker nodes
# ------------------------------------------------------------
- name: Render kubeadm join config locally
  when: "'worker_nodes' in group_names"
  delegate_to: localhost
  template:
    src: kubeadm-join.yaml.j2
    dest: "/tmp/{{ inventory_hostname_short }}-kubeadm-join.yaml"
    mode: "0644"

- name: Ensure ignition output directories exist
  delegate_to: localhost
  file:
    path: "{{ output_dir }}/{{ inventory_hostname }}"
    state: directory
    mode: '0755'

- name: Render NoCloud user-data
  delegate_to: localhost
  template:
    src: "{{ 'user-data-controller.j2' if inventory_hostname in groups['control_nodes'] else 'user-data-worker.j2' }}"
    dest: "{{ output_dir }}/{{ inventory_hostname }}/user-data"
    mode: "0644"
  vars:
    # We use 'errors=ignore' or a conditional check to prevent the crash
    kubeadm_init_yaml: >-
      {{ lookup('file', '/tmp/' + inventory_hostname_short + '-kubeadm-init.yaml', errors='ignore') 
         if inventory_hostname in groups['control_nodes'] else '' }}
    
    kubeadm_join_yaml: >-
      {{ lookup('file', '/tmp/' + inventory_hostname_short + '-kubeadm-join.yaml', errors='ignore') 
         if (inventory_hostname in groups['worker_nodes'] or inventory_hostname == 'kvmdc01') else '' }}

- name: Render kubeadm config (controller or worker)
  delegate_to: localhost
  template:
    src: "{{ (inventory_hostname in groups['control_nodes']) | ternary('kubeadm-init.yaml.j2', 'kubeadm-join.yaml.j2') }}"
    dest: "/tmp/{{ inventory_hostname_short }}-kubeadm.yaml"
    mode: "0644"
  register: rendered_kubeadm

- name: Render NoCloud meta-data
  delegate_to: localhost
  template:
    src: meta-data.j2
    # Ensure this matches the Copy task's expectations exactly
    dest: "{{ output_dir }}/{{ inventory_hostname }}/meta-data"
    mode: "0644"

- name: Render NoCloud user-data
  delegate_to: localhost
  template:
    src: "{{ 'user-data-controller.j2' if inventory_hostname in groups['control_nodes'] else 'user-data-worker.j2' }}"
    dest: "{{ output_dir }}/{{ inventory_hostname }}/user-data"
    mode: "0644"
  vars:
    # We read the files directly from the local /tmp folder where they were saved
    kubeadm_init_yaml: "{{ lookup('file', '/tmp/' + inventory_hostname_short + '-kubeadm-init.yaml') if inventory_hostname in groups['control_nodes'] else '' }}"
    kubeadm_join_yaml: "{{ lookup('file', '/tmp/' + inventory_hostname_short + '-kubeadm-join.yaml') if inventory_hostname in groups['worker_nodes'] else '' }}"
  
- name: Create NoCloud directory on KVM host
  delegate_to: "{{ VM_HOST_IP }}"
  become: yes
  file:
    path: "/var/lib/libvirt/images/nocloud/{{ inventory_hostname_short }}"
    state: directory
    mode: "0755"

- name: Ensure staging directory exists on KVM host
  delegate_to: "{{ VM_HOST_IP }}"
  file:
    path: /tmp/nocopy
    state: directory
    mode: '0777'  # Broad permissions so the copy user can write to it

- name: Copy NoCloud files to KVM host staging
  delegate_to: "{{ VM_HOST_IP }}"
  copy:
    src: "{{ output_dir }}/{{ inventory_hostname }}/{{ item }}"
    dest: "/tmp/nocopy/{{ inventory_hostname }}-{{ item }}"
    mode: "0644"
  loop:
    - user-data
    - meta-data

- name: Move NoCloud files to final destination
  delegate_to: "{{ VM_HOST_IP }}"
  become: true
  shell: |
    mkdir -p /var/lib/libvirt/images/nocloud/
    mv /tmp/nocopy/{{ inventory_hostname }}-user-data /var/lib/libvirt/images/nocloud/{{ inventory_hostname }}-user-data
    mv /tmp/nocopy/{{ inventory_hostname }}-meta-data /var/lib/libvirt/images/nocloud/{{ inventory_hostname }}-meta-data
    chown root:root /var/lib/libvirt/images/nocloud/{{ inventory_hostname }}-*

- name: Generate NoCloud ISO
  delegate_to: "{{ VM_HOST_IP }}"
  become: yes
  shell: |
    sudo genisoimage -output /var/lib/libvirt/images/nocloud/{{ inventory_hostname }}.iso \
      -volid cidata \
      -joliet -rock \
      -graft-points \
      user-data=/var/lib/libvirt/images/nocloud/{{ inventory_hostname }}-user-data \
      meta-data=/var/lib/libvirt/images/nocloud/{{ inventory_hostname }}-meta-data
  args:
    creates: "/var/lib/libvirt/images/nocloud/{{ inventory_hostname }}.iso"