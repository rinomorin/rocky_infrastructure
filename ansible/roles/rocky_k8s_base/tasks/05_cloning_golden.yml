---
# 05_cloning_golden.yml - Orchestrate Clones on KVM Host

- name: Set golden image variables
  set_fact:
    golden_vm: "golden-base"
    golden_disk: "/var/lib/libvirt/images/golden-base.qcow2"
    # Combine groups for processing
    all_target_nodes: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"

- name: Ensure golden-base is powered off
  community.libvirt.virt:
    name: "{{ golden_vm }}"
    state: shutdown
  delegate_to: "{{ VM_HOST_IP }}"
  ignore_errors: yes

- name: Wait for golden image to be powered off
  shell: sudo virsh domstate {{ golden_vm }}
  register: golden_power
  until: golden_power.stdout == "shut off"
  retries: 15
  delay: 3
  delegate_to: "{{ VM_HOST_IP }}"

- name: Clone VMs from Golden Base
  loop: "{{ all_target_nodes }}"
  loop_control:
    loop_var: node
  shell: |
    sudo virt-clone \
      --original "{{ golden_vm }}" \
      --name "{{ node }}" \
      --file "/var/lib/libvirt/images/{{ node }}.qcow2" \
      --auto-clone
  args:
    creates: "/etc/libvirt/qemu/{{ node }}.xml"
  delegate_to: "{{ VM_HOST_IP }}"

- name: Adjust NICs and Attach NoCloud ISOs
  delegate_to: "{{ VM_HOST_IP }}"
  block:
    - name: Remove default NAT NIC from specific nodes if required
      loop: "{{ groups['worker_nodes'] }}"
      shell: |
        MAC=$(sudo virsh domiflist {{ item }} | awk '/default/ {print $5}')
        if [ -n "$MAC" ]; then
          sudo virsh detach-interface {{ item }} network --mac $MAC --config --persistent
        fi
      loop_control:
        loop_var: item
      ignore_errors: yes

    - name: Attach NoCloud ISOs
      include_tasks: chck_node.yml
      loop: "{{ all_target_nodes }}"
      loop_control:
        loop_var: node

- name: Start all cloned VMs
  community.libvirt.virt:
    name: "{{ item }}"
    state: running
  loop: "{{ all_target_nodes }}"
  delegate_to: "{{ VM_HOST_IP }}"

- name: Wait for and Collect Node Networking Data
  delegate_to: "{{ VM_HOST_IP }}"
  shell: |
    timeout=300
    start_time=$(date +%s)
    
    # Define the nodes we care about from the Ansible list
    TARGETS="{{ all_target_nodes | join(' ') }}"
    
    while true; do
      results="["
      all_found=true
      
      # Only iterate over VMs that contain 'mast' or 'wrk' in their name
      for node in $TARGETS; do
        if [[ ! "$node" =~ "mast" && ! "$node" =~ "wrk" ]]; then
          continue
        fi

        # 1. Get the MAC for the provisioning interface (br-nat)
        MAC=$(sudo virsh domiflist "$node" | grep 'br-nat' | awk '{print $NF}')
        
        # 2. Look up the IP in the DHCP leases by MAC
        # We grep the IP and the MAC to ensure the lease is active
        LEASE=$(sudo virsh net-dhcp-leases br-nat | grep -i "$MAC" | awk '{print $5}' | sed 's/\/24//')
        
        if [ -n "$LEASE" ]; then
          results+="{\"name\": \"$node\", \"mac\": \"$MAC\", \"temp_ip\": \"$LEASE\"},"
        else
          all_found=false
        fi
      done
      
      if [ "$all_found" = true ]; then
        # Remove trailing comma and close JSON array
        echo "${results%,}]"
        exit 0
      fi
      
      if [ $(($(date +%s) - start_time)) -gt $timeout ]; then
        echo "Timeout: Not all nodes obtained a lease." >&2
        exit 1
      fi
      sleep 5
    done
  register: kvm_discovery_json

- debug:
    msg: kvm_discovery_json

- name: Construct Cluster Node Facts
  set_fact:
    cluster_node_data: >-
      {% set discovered = kvm_discovery_json.stdout | from_json %}
      {% set node_list = [] %}
      {% for item in discovered %}
        {% do node_list.append({
          'name': item.name,
          'mac': item.mac,
          'temp_ip': item.temp_ip,
          'final_provision_ip': hostvars[item.name]['provision_ip'],
          'final_provider_ip': hostvars[item.name]['provider_ip'],
          'is_master': (item.name in groups['control_nodes'])
        }) %}
      {% endfor %}
      {{ node_list }}
  # Note: If your Ansible version still complains about 'do', use the JSON template format from the previous response.
# ------------------------------------------------------------
# BUILD THE HANDOFF DATA
# ------------------------------------------------------------
# ------------------------------------------------------------
# BUILD THE HANDOFF DATA
# ------------------------------------------------------------
- name: Construct Node Data Fact
  set_fact:
    cluster_node_data: >-
      [
      {% for result in dhcp_results.results %}
        {
          "name": "{{ result.item }}",
          "temp_ip": "{{ result.stdout }}",
          "final_provision_ip": "{{ hostvars[result.item]['provision_ip'] }}",
          "final_provider_ip": "{{ hostvars[result.item]['provider_ip'] }}",
          "is_master": {{ result.item in groups['control_nodes'] | lower }}
        }{{ '' if loop.last else ',' }}
      {% endfor %}
      ]

- name: Debug Summary for Handoff
  debug:
    msg: "Node {{ item.name }} is reachable at {{ item.temp_ip }}. Final IP will be {{ item.final_provision_ip }}"
  loop: "{{ cluster_node_data | from_json }}"
