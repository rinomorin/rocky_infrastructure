---
- name: Configure Firewalld via SSH (Bypass Python dependency)
  vars:
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
    target_ip: "{{ hostvars[inventory_hostname].ansible_host }}"
  shell: |
    rm -f ~/.ssh/known_hosts*
    ssh {{ ssh_opts }} core@{{ target_ip }} << 'EOF'
      # Start and enable service
      sudo systemctl enable --now firewalld
      
      # Master Node Ports
      {% if 'control_nodes' in group_names %}
      sudo firewall-cmd --permanent --add-port={6443,2379-2380,10250,10257,10259}/tcp
      sudo firewall-cmd --permanent --add-port=8472/udp
      {% endif %}

      # Worker Node Ports
      {% if 'worker_nodes' in group_names %}
      sudo firewall-cmd --permanent --add-port=10250/tcp
      sudo firewall-cmd --permanent --add-port=30000-32767/tcp
      sudo firewall-cmd --permanent --add-port=8472/udp
      {% endif %}

      sudo firewall-cmd --reload
    EOF
  delegate_to: localhost
  register: firewall_out
  retries: 5
  delay: 5
  until: firewall_out.rc == 0
  # Only skip the Hypervisor, apply to Masters, Workers, and LBs
  when: "'kvm' not in group_names"

- name: Install etcdctl via SSH (Bypass Python dependency)
  vars:
    etcd_ver: "v3.5.12"
    opt1: "-o StrictHostKeyChecking=no"
    opt2: "-o UserKnownHostsFile=/dev/null"
    opt3: "-o ConnectTimeout=10"
    opt4: "-o ProxyCommand=none"
    target_ip: "{{ hostvars[inventory_hostname].ansible_host }}" 
  block:
    - name: "Bootstrap etcdctl via SSH and Curl"
      delegate_to: localhost
      shell: |
        rm -f ~/.ssh/known_hosts*
        ssh {{ opt1 }} {{ opt2 }} {{ opt3 }} {{ opt4 }} core@{{ target_ip }}  << 'EOF'
          # Exit immediately if a command fails
          set -e

          if [ ! -f /usr/local/bin/etcdctl ]; then
            echo "Installing etcdctl on $(hostname)..."
            curl -L -s https://github.com/etcd-io/etcd/releases/download/v3.5.12/etcd-v3.5.12-linux-amd64.tar.gz -o /tmp/etcd.tar.gz
            
            # Extract binary to /tmp
            tar -xzf /tmp/etcd.tar.gz -C /tmp --strip-components=1 etcd-v3.5.12-linux-amd64/etcdctl
            
            # Deploy and set permissions
            sudo mv /tmp/etcdctl /usr/local/bin/etcdctl
            sudo chmod +x /usr/local/bin/etcdctl
            
            # Cleanup
            rm /tmp/etcd.tar.gz
            echo "etcdctl installed successfully."
          else
            echo "etcdctl already exists, skipping download."
          fi
        EOF
      when: 
        - inventory_hostname in groups['cluster_nodes']
        - "'helper_nodes' not in group_names"
      register: etcd_bootstrap_out
      changed_when: "'installed successfully' in etcd_bootstrap_out.stdout"

- name: Debug Firewall Output for {{ inventory_hostname }}
  debug:
    msg: "{{ firewall_out.stdout_lines }}"
  when: firewall_out.stdout is defined

# This creates the file LOCALLY on your helper machine/laptop
- name: Prepare Manual Initialization (Primary Master)
  block:
    - name: Create the manual init script locally
      delegate_to: localhost
      become: false
      vars:
        # Calculate the internal VIP (.30) based on the provision network
        first_master: "{{ groups['control_nodes'][0] }}"
        provision_net: "{{ hostvars[first_master]['provision_ip'].split('.')[:3] | join('.') }}"
        internal_vip: "{{ provision_net }}.30"
      copy:
        dest: /tmp/manual_k8s_init.sh
        mode: '0755'
        content: |
          #!/bin/bash
          {% raw %}
          echo "--- Cleaning and Resetting ---"
          sudo kubeadm reset -f
          
          echo "--- Ensuring CRI-O is active ---"
          sudo systemctl enable --now crio
          
          echo "--- Initializing Cluster ---"
          # Fixed: kubeadm init (removed the extra dash)
          sudo kubeadm init \
          {% endraw %}
            --control-plane-endpoint '{{ internal_vip }}:6443' \
            --upload-certs \
            --pod-network-cidr=10.244.0.0/16 \
            --apiserver-advertise-address={{ hostvars[first_master]['provision_ip'] }} \
            --cri-socket unix:///var/run/crio/crio.sock \
            --ignore-preflight-errors=Swap,SystemVerification | tee /tmp/kubeadm_output
          
          {% raw %}
          # Extract variables
          TOKEN=$(grep "kubeadm join" /tmp/kubeadm_output | head -n 1 | awk '{print $5}')
          HASH=$(grep "sha256:" /tmp/kubeadm_output | head -n 1 | awk '{print $2}')
          CERT_KEY=$(grep -A 1 "Using certificate key:" /tmp/kubeadm_output | tail -n 1 | xargs)

          echo -e "\n\n=========================================================="
          echo "K8S INITIALIZATION COMPLETE"
          echo "=========================================================="
          {% endraw %}

          echo "--- To configure kubectl for your user, run: ---"
          echo "mkdir -p \$HOME/.kube"
          echo "sudo cp -i /etc/kubernetes/admin.conf \$HOME/.kube/config"
          echo "sudo chown \$(id -u):\$(id -g) \$HOME/.kube/config"
          echo
          echo "kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml"

          echo -e "\n--- COPY THIS FOR SECONDARY MASTERS ---"
          echo "sudo kubeadm join {{ internal_vip }}:6443 \\"
          echo "  --token \$TOKEN \\"
          echo "  --discovery-token-ca-cert-hash \$HASH \\"
          echo "  --control-plane --certificate-key \$CERT_KEY \\"
          echo "  --apiserver-advertise-address=<LOCAL_PROVISION_IP> \\"
          echo "  --ignore-preflight-errors=Swap,SystemVerification"

          echo -e "\n--- COPY THIS FOR WORKER NODES ---"
          echo "sudo kubeadm join {{ internal_vip }}:6443 \\"
          echo "  --token \$TOKEN \\"
          echo "  --discovery-token-ca-cert-hash \$HASH \\"
          echo "  --ignore-preflight-errors=Swap,SystemVerification"
          echo -e "\n==========================================================\n"

    # Now scp it from /tmp/ to the remote node
    - name: scp file to host
      delegate_to: localhost
      become: false
      shell: |
        rm ~/.ssh/known_host*
        scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
        /tmp/manual_k8s_init.sh core@{{ ansible_host }}:~/manual_k8s_init.sh

    - name: Instructions for Master
      debug:
        msg: "Run this on {{ inventory_hostname }}: sudo bash ~/manual_k8s_init.sh"

  when: inventory_hostname == groups['control_nodes'][0]