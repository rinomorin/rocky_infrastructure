- name: Configure resolv.conf to use IPA DNS
  become: yes
  copy:
    dest: /etc/resolv.conf
    content: |
      search {{ ipa_domain }}
      nameserver {{ ipa_master_ip }}
    owner: root
    group: root
    mode: '0644'

# --- Fetch CA from master to control node ---
- name: Fetch ca.crt from IPA master (force replace)
  delegate_to: "{{ ipa_master }}"
  become: false
  fetch:
    src: /etc/ipa/ca.crt
    dest: /tmp/ca.crt
    flat: yes
    force: yes

# --- Push CA to intermediate ---
- name: Push ca.crt to intermediate (force replace)
  become: yes
  copy:
    src: /tmp/ca.crt
    dest: /etc/pki/ca-trust/source/anchors/ca.crt
    owner: root
    group: root
    mode: '0644'
    force: yes

# --- Push CA to intermediate ---
- name: Push ca.crt to intermediate (force replace)
  become: yes
  copy:
    src: /tmp/ca.crt
    dest: /etc/ipa/ca.crt
    owner: root
    group: root
    mode: '0644'
    force: yes

# --- Rebuild trust store ---
- name: Update CA trust on intermediate
  become: yes
  command: update-ca-trust

# --- Verify CA trust with trust list ---
- name: Verify CA trust list contains IPA CA
  command: trust list
  register: trust_list
  changed_when: false

# --- Verify CA trust with openssl ---
- name: Verify IPA CA certificate is trusted
  command: >
    openssl verify -CAfile /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem /etc/ipa/ca.crt
  register: ca_verify
  changed_when: false

- name: Verify ipa master forward DNS from ca intermediate
  command: dig +short {{ ipa_master }}.{{ ipa_domain }} @{{ ipa_master_ip }}
  register: forward_check

- name: Fail if {{ ipa_master }} not resolvable
  fail:
    msg: "{{ ipa_master}}.{{ipa_domain }} not resolvable from {{ ipa_ca_intermediate }}"
  when: forward_check.stdout == ""

- name: Verify LDAP connectivity from {{ ipa_ca_intermediate }}
  command: ldapsearch -H ldap://{{ ipa_master }}.{{ ipa_domain }} -x -b "" -s base "(objectclass=*)"
  register: ldap_check

- name: Fail if LDAP not reachable{{ ipa_ca_intermediate }}
  fail:
    msg: "{{ ipa_master}}.{{ipa_domain }} LDAP not reachable from {{ ipa_ca_intermediate }}"
  when: ldap_check.rc != 0

- name: Verify Kerberos kinit with admin password
  expect:
    command: kinit admin@{{ ipa_domain | upper }}
    responses:
      '(?i)Password for admin.*': "{{ ipa_admin_password }}"
  register: kinit_check
  changed_when: false
  no_log: true

- name: Fail if Kerberos not working
  fail:
    msg: "Kerberos kinit failed on {{ ipa_ca_intermediate }}"
  when: kinit_check.rc != 0


# --- Pre-flight validation before replica install ---

- name: Check Dogtag CA service on master
  delegate_to: "{{ ipa_master }}"
  command: systemctl is-active pki-tomcatd@pki-tomcat.service
  register: ca_service
  changed_when: false
  failed_when: ca_service.stdout != "active"

- name: Verify  forward DNS
  command: dig +short {{ ipa_ca_intermediate }}.{{ ipa_domain }} @{{ ipa_master_ip }}
  register: forward_check
  changed_when: false
  failed_when: forward_check.stdout == ""

- name: Verify {{ ipa_ca_intermediate }} reverse DNS
  command: dig +short -x {{ ipa_ca_intermediate_ip }} @{{ ipa_master_ip }}
  register: reverse_check
  changed_when: false
  failed_when: reverse_check.stdout == ""

- name: Show DNS validation results
  debug:
    msg:
      - "Dogtag CA service on {{ ipa_master }}: {{ ca_service.stdout }}"
      - "Forward lookup {{ ipa_ca_intermediate }}: {{ forward_check.stdout }}"
      - "Reverse lookup {{ ipa_ca_intermediate }}: {{ reverse_check.stdout }}"

- name: Configure resolv.conf to use IPA DNS
  become: yes
  copy:
    dest: /etc/resolv.conf
    content: |
      search {{ ipa_domain }}
      nameserver {{ ipa_master_ip }}
    owner: root
    group: root
    mode: '0644'
    force: yes 

- name: Acquire Kerberos ticket for admin
  expect:
    command: kinit admin@{{ ipa_domain | upper }}
    responses:
      '(?i)Password for admin.*': "{{ ipa_admin_password }}"
  register: kinit_admin
  changed_when: false
  no_log: true

- name: Check if IPA is configured on this host
  become: yes
  stat:
    path: /etc/ipa/default.conf
  register: ipa_conf

- name: List active replicas (only on configured masters)
  become: yes
  shell: ipa-replica-manage list 2>/dev/null || true
  register: replica_check
  changed_when: false
  when: ipa_conf.stat.exists
  delegate_to: "{{ ipa_master }}"
  run_once: true


- name: Install IPA replica on intermediate (CA)
  become: yes
  shell: |
    umask 0022 && ipa-replica-install \
      --unattended \
      --server={{ ipa_master }}.{{ ipa_domain | lower }} \
      --domain={{ ipa_domain | lower }} \
      --realm={{ ipa_domain | upper }} \
      --admin-password='{{ ipa_admin_password }}' \
      --hostname={{ inventory_hostname }}.{{ ipa_domain | lower }} \
      --setup-ca \
      --setup-kra \
      --auto-reverse \
      --auto-forwarders \
      --setup-dns
  when:
    - not ipa_conf.stat.exists            # only if this node isn’t already configured
    - inventory_hostname not in (replica_check.stdout | default(""))
  no_log: true

# --- Service checks ---
- name: Check IPA related services on {{ ipa_ca_intermediate }}
  ansible.builtin.systemd:
    name: "{{ item }}"
  loop:
    - ipa.service
    - "dirsrv@{{ ipa_domain | upper }}"
    - krb5kdc.service
    - kadmin.service
    - pki-tomcatd@pki-tomcat.service
    - named-pkcs11.service
  register: ipa_services
  ignore_errors: true

- name: Show IPA service states
  debug:
    var: ipa_services.results

# --- Kerberos host principal check ---
- name: Verify Kerberos kinit with host keytab
  command: >
    kinit -kt /etc/krb5.keytab host/{{ inventory_hostname }}.{{ ipa_domain | lower }}@{{ ipa_domain | upper }}
  register: kinit_host
  changed_when: false

- name: Fail if Kerberos host kinit failed
  fail:
    msg: "Kerberos kinit with host keytab failed on {{ ipa_ca_intermediate }}"
  when: kinit_host.rc != 0

# --- DNS zone check ---
- name: Verify DNS zones on {{ ipa_ca_intermediate }}
  command: ipa dnszone-find
  register: dns_zones
  changed_when: false

# --- CA certificate validation ---
- name: Validate CA certificate on 
  command: openssl x509 -in /etc/ipa/ca.crt -noout -text
  register: ca_cert
  changed_when: false

# --- LDAP connectivity check ---
- name: Test LDAP connectivity on 
  command: ldapsearch -H ldap://localhost:389 -x -b "" -s base "(objectclass=*)"
  register: ldap_check
  changed_when: false

# --- LDAPS connectivity check ---
- name: Test LDAPS connectivity on 
  command: ldapsearch -H ldaps://localhost:636 -D "cn=Directory Manager" -w {{ ipa_dm_password }} -b "" -s base "(objectclass=*)"
  register: ldaps_check
  changed_when: false
  no_log: true

