# roles/ipa_setup/install.yml
- name: Install IPA packages
  package:
    name:
      - freeipa-server
      - freeipa-server-dns
      - samba
      - samba-winbind
      - samba-winbind-clients
      - ipa-server-trust-ad
      - python3-pexpect
    state: present
    nobest: true
  register: ipa_install_result
  when: "'ca' in group_names or 'ca_intermediate' in group_names"

- name: Ensure IPA install audit directory exists
  file:
    path: /var/log/ipa_install_status
    state: directory
    mode: '0755'
  when: "'ca' in group_names or 'ca_intermediate' in group_names"
 
- name: Ensure IPA install audit directory exists
  file:
    path: /var/log/ipa_version
    state: directory
    mode: '0755'
  when: "'ca' in group_names or 'ca_intermediate' in group_names"

- name: Configure firewall for IPA
  become: true
  ansible.builtin.shell: |
    firewall-cmd --set-default-zone=drop && \
    firewall-cmd --permanent --zone=drop \
      --add-service=http \
      --add-service=https \
      --add-service=dns \
      --add-service=dns-over-tls \
      --add-service=ldap \
      --add-service=ldaps \
      --add-service=kerberos \
      --add-service=ssh \
      --add-service=ntp && \
    firewall-cmd --permanent --zone=drop \
      --add-port=80/tcp \
      --add-port=443/tcp \
      --add-port=53/tcp \
      --add-port=53/udp \
      --add-port=88/tcp \
      --add-port=88/udp \
      --add-port=123/udp \
      --add-port=389/tcp \
      --add-port=636/tcp \
      --add-port=464/tcp \
      --add-port=464/udp \
      --add-port=8443/tcp \
      --add-port=8080/tcp \
      --add-port=3268/tcp \
      --add-port=3269/tcp && \
    firewall-cmd --reload

- name: reboot after ipa install
  reboot:
    msg: "Rebooting after IPA package installation"
    pre_reboot_delay: 10
    reboot_timeout: 600
    post_reboot_delay: 30
  when: 
    - "'ca' in group_names or 'ca_intermediate' in group_names"
    - ipa_install_result.changed


