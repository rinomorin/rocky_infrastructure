- name: Refresh Facts
  ansible.builtin.package_facts:
    manager: auto

- name: Check for IPA configuration
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_conf_file

- name: Check IPA service status
  ansible.builtin.command: "ipactl status"
  register: ipa_service_check
  failed_when: false
  changed_when: false

- name: "Determine IPA Stage"
  ansible.builtin.set_fact:
    ipa_stage: "{{ item.stage }}"
  when: item.condition
  loop:
    # Use the name found in your 'rpm -qa'
    - stage: "required"
      condition: "{{ 'ipa-server' not in ansible_facts.packages }}"
    
    - stage: "unconfigured"
      condition: "{{ 'ipa-server' in ansible_facts.packages and not ipa_conf_file.stat.exists }}"
    
    - stage: "configured"
      condition: "{{ ipa_conf_file.stat.exists and ipa_service_check.rc != 0 }}"
    
    - stage: "running"
      condition: "{{ ipa_conf_file.stat.exists and ipa_service_check.rc == 0 }}"