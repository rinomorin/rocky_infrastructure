---
- name: test our connections on {{ guest_member }}
  import_tasks: connections.yml
  
- name: Check IPA status
  import_tasks: check_status.yml
  
- name: What is check_status
  debug:
    msg: |
      - "host {{ inventory_hostname }}"
      - "stage {{ipa_stage}}"
      - "type {{ipa_type}}"
  
- name: Initial, Health & Recovery Self-healing
  block:

  # --- STAGE 1: Install RPMs & Prepare ---
  - name: Process Stage 1 - Installation
    import_tasks: install_ipa.yml
    when: ipa_stage == 'required'

  - name: Process Stage 2 - Primary host Configuration
    import_tasks: ipa_ca.yml
    when: 
      - ipa_stage == 'unconfigured'
      - ipa_type in ('primary', 'master')

