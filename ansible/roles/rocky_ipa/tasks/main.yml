---
# --- STAGE 0: NETWORK & RESOLUTION PREP ---
- name: Enforce IPA DNS Resolution
  become: yes
  block:
    - name: "DNS Prep - Identify Active Interface Name"
      ansible.builtin.shell: "nmcli -t -f NAME connection show --active | head -n 1"
      register: active_conn_name
      changed_when: false

    - name: "DNS Prep - Test Connectivity to Master IP"
      ansible.builtin.command: "ping -c 1 {{ ipa_master_ip }}"
      changed_when: false

    - name: "DNS Prep - Configure DNS via NMCLI Shell"
      # We force 'ipv4.ignore-auto-dns yes' so DHCP doesn't overwrite us
      ansible.builtin.shell: |
        nmcli connection modify "{{ active_conn_name.stdout }}" \
        ipv4.dns "{{ ipa_master_ip }}" \
        ipv4.dns-search "{{ ipa_domain }}" \
        ipv4.ignore-auto-dns yes && \
        nmcli connection up "{{ active_conn_name.stdout }}"
      register: dns_result
      # Only run if we aren't the Master
      when: ansible_host != ipa_master_ip

    - name: "DNS Prep - Verify Resolution"
      # Now nslookup should work because we pointed it to the Master
      ansible.builtin.command: "nslookup {{ ipa_master_fqdn }}"
      changed_when: false
      when: dns_result is changed

  # Run on everything that isn't the primary master
  when: 
    - ansible_host != ipa_master_ip
    - ipa_stage == 'unconfigured'

# --- STAGE 2: DNS INJECTION (PRE-INSTALL) ---
- name: Ensure DNS Records exist for installation
  become: true
  ansible.builtin.shell: |
    echo '{{ ipa_admin_password }}' | kinit admin && \
    ipa dnsrecord-add {{ ipa_domain }} {{ inventory_hostname.split('.')[0] }} --a-rec={{ ansible_host }}
  delegate_to: "{{ ipa_master_ip }}"
  when: 
    - ipa_type == 'replica'
    - ipa_stage == 'unconfigured'
  register: dns_injection_out
  failed_when: 
    - dns_injection_out.rc != 0 
    - "'already exists' not in dns_injection_out.stderr"
  no_log: true


