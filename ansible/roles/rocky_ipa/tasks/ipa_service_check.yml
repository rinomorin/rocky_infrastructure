---
# --- SECTION 1: Setup on the Source (Primary) ---
- name: "Verification - Setup Test Data on Master"
  delegate_to: "{{ groups['ipa'][0] }}"
  become: yes
  block:
    - name: Master - Authenticate admin
      shell: "echo '{{ ipa_admin_password }}' | kinit admin@{{ search_domain | upper }}"
      changed_when: false
      no_log: true

    - name: Master - Create test record
      command: "ipa dnsrecord-add {{ search_domain }} remotecheck --a-rec=1.2.3.4"
      register: dns_create
      failed_when: 
        - dns_create.rc != 0 
        - "'already exists' not in dns_create.stderr"

    - name: Master - Create test User
      command: "ipa user-add remoteuser --first=Remote --last=Test --password"
      args:
        stdin: "{{ ipa_test_user_password }}\n{{ ipa_test_user_password }}\n"
      register: user_create
      failed_when: 
        - user_create.rc != 0 
        - "'already exists' not in user_create.stderr"

# --- SECTION 2: Probe from the Helper (Targeting the Secondary) ---
- name: "Verification - Query Secondary from Helper"
  delegate_to: "{{ next_host }}"
  become: yes
  block:
    - name: Helper - Force DNS to Secondary
      ansible.builtin.copy:
        content: |
          search {{ search_domain }}
          nameserver {{ nameserver_ip }}
        dest: /etc/resolv.conf
        backup: yes
      register: helper_dns_backup

    - name: Helper - Verify Data sync (Replication Check)
      command: "host remotecheck.{{ search_domain }}"
      register: dns_verify
      retries: 3
      delay: 5
      until: dns_verify.rc == 0

    - name: Helper - Raw Kerberos Check
      shell: "echo '{{ ipa_test_user_password }}' | kinit remoteuser@{{ search_domain | upper }}"
      environment:
        KRB5_CONFIG: "/dev/null" 
        KRB5_KDC: "{{ nameserver_ip }}"
      register: krb_raw_check

    - name: Helper - Verify Web UI on Secondary
      uri:
        url: "https://{{ nameserver_ip }}/ipa/ui/"
        validate_certs: no
        status_code: 200
      register: web_check

  always: # This must be followed by a list of tasks, NOT "true"
    - name: Helper - Restore Original DNS
      shell: "mv {{ helper_dns_backup.backup_file }} /etc/resolv.conf"
      when: helper_dns_backup.backup_file is defined
      ignore_errors: yes

    - name: Helper - Clear Tickets
      command: "kdestroy -A"
      changed_when: false

# --- SECTION 3: Final Cleanup on Master ---
- name: "Verification - Cleanup Master"
  delegate_to: "{{ groups['ipa'][0] }}"
  become: yes
  block:
    - name: Master - Remove test DNS
      command: "ipa dnsrecord-del {{ search_domain }} remotecheck --a-rec=1.2.3.4"
      failed_when: false

    - name: Master - Remove test User
      command: "ipa user-del remoteuser"
      failed_when: false