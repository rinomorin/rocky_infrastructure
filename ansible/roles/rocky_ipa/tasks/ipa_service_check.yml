---
# Test purpose only
- name: set test id
  set_fact:
    ipa_test_user: "{{ lookup('env', 'ipa_test_user_password') }}"
    ipa_test_user_password: "{{ lookup('env', 'ipa_test_user_password') }}"

- name: Network Prep - Conditional Temporary DNS
  become: yes
  ansible.builtin.shell: |
    # 1. Check for localhost DNS
    if grep -q "127.0.0.1" /etc/resolv.conf; then
        if command -v ipactl >/dev/null 2>&1 && ipactl status >/dev/null 2>&1; then
            echo "Local IPA is alive. No change needed."
            exit 0
        fi
    fi

    # 2. Check for Master IP DNS
    MASTER_IP="{{ hostvars[item]['ansible_host'] | default(ipa_master_ip) }}"
    if grep -q "$MASTER_IP" /etc/resolv.conf; then
        # Check if we have 'host' or 'nc' to verify the Master
        if command -v host >/dev/null 2>&1; then
            if host -W 1 "$MASTER_IP" "$MASTER_IP" >/dev/null 2>&1; then
                echo "Master DNS is resolving. No change needed."
                exit 03_verify_orchestrator 
            fi
        elif command -v nc >/dev/null 2>&1; then
            if nc -z -w 2 "$MASTER_IP" 53 >/dev/null 2>&1; then
                echo "Master port 53 is reachable via nc. No change needed."
                exit 0
            fi
        fi
    fi

    # 3. Fallback Check: Is Google already there?
    if grep -q "8.8.8.8" /etc/resolv.conf; then
        echo "8.8.8.8 already present. No change needed."
        exit 0
    fi

    # 4. If we reached here, tools are missing or Master is unreachable
    echo "nameserver 8.8.8.8" > /etc/resolv.conf
    echo "nameserver 1.1.1.1" >> /etc/resolv.conf
    echo "Updated resolv.conf with temporary DNS to allow tool installation"
  register: dns_update_result
  changed_when: "'Updated' in dns_update_result.stdout"
  delegate_to: "{{ item }}"
  loop: "{{ groups['ipa'] }}"


# SECTION 1: Setup on the Source (Primary)
- name: "Verification - Setup Test Data on Master"
  delegate_to: "{{ groups['ipa'][0] }}"
  become: yes
  block:
    - name: Master - Authenticate admin
      shell: "echo '{{ ipa_admin_password }}' | kinit admin@{{ search_domain | upper }}"
      changed_when: false
      no_log: true

    - name: Master - Create test DNS record
      command: "ipa dnsrecord-add {{ search_domain }} remotecheck --a-rec=1.2.3.4"
      register: dns_create
      failed_when: 
        - dns_create.rc != 0 
        - "'already exists' not in dns_create.stderr"
        - "'no modifications' not in dns_create.stderr"

    - name: Master - Create test User
      command: "ipa user-add remoteuser --first=Remote --last=Test --password"
      args:
        stdin: "{{ ipa_test_user_password }}\n{{ ipa_test_user_password }}\n"
      register: user_create
      failed_when: 
        - user_create.rc != 0 
        - "'already exists' not in user_create.stderr"

    - name: Master - Administrative Password Bypass
      command: "ipa user-mod remoteuser --setattr krbPasswordExpiration=20300101000000Z"
      register: pass_bypass
      failed_when:
        - pass_bypass.rc != 0
        - "'no modifications' not in pass_bypass.stderr"
      when: user_create.rc == 0 or 'already exists' in user_create.stderr

# SECTION 2: Probe from the next host (Targeting the Secondary)
- name: "Verification - Query Secondary from Helper"
  delegate_to: "{{ next_host }}"
  become: yes
  block:
    - name: Remote - DNS Setup with Backup
      ansible.builtin.copy:
        content: |
          search {{ search_domain }}
          nameserver {{ nameserver_ip }}
        dest: /etc/resolv.conf
        backup: yes
      register: dns_backup_info

    - name: "Wait for DNS Propagation"
      ansible.builtin.pause:
        seconds: 10

    - name: Remote - Verify DNS resolution
      ansible.builtin.command: "host remotecheck.{{ search_domain }} {{ ipa_master_ip }}"
      register: dns_verify
      # We ignore here just so we can reach the Summary and see the data
      ignore_errors: yes

    - name: Remote - Raw Kerberos Check
      shell: "echo '{{ ipa_test_user_password }}' | kinit remoteuser@{{ search_domain | upper }}"
      register: krb_raw_check
      ignore_errors: yes
      environment:
        KRB5_CONFIG: "/dev/null"
        KRB5_KDC: "{{ nameserver_ip }}"

    - name: Remote - Raw LDAP Check
      ansible.builtin.command: >
        ldapsearch -x -H ldap://{{ nameserver_ip }} 
        -b "cn=users,cn=accounts,{{ 'dc=' + search_domain | replace('.', ',dc=') }}" 
        "uid=remoteuser"
      register: ldap_raw_check
      ignore_errors: yes

    - name: Remote - Test Web UI Reachability
      uri:
        url: "https://{{ ipa_master_fqdn }}/ipa/ui/"
        validate_certs: no
        status_code: 200
      register: web_check
      ignore_errors: yes

  always:
    - name: "Verification Summary Results"
      debug:
        msg: 
          - "--- DIAGNOSTIC SUMMARY ---"
          - "DNS  Reachability : {{ 'ok' if (dns_verify.rc | default(1)) == 0 else 'FAILED (' + (dns_verify.stdout | default('no-output')) + ')' }}"
          - "LDAP Reachability : {{ 'ok' if (ldap_raw_check.rc | default(1)) == 0 else 'FAILED' }}"
          - "KRBR Auth Check  : {{ 'ok' if (krb_raw_check.rc | default(1)) == 0 else 'FAILED' }}"
          - "WEB  UI Check    : {{ 'ok' if (web_check.status | default(-1)) == 200 else 'FAILED' }}"

    - name: Remote - Restore Original DNS
      shell: "mv {{ dns_backup_info.backup_file }} /etc/resolv.conf"
      when: dns_backup_info is defined and dns_backup_info.backup_file is defined
      ignore_errors: yes

    - name: Remote - Clear Tickets
      ansible.builtin.shell: |
        if command -v kdestroy >/dev/null 2>&1; then
          kdestroy -A
        fi
      failed_when: false
      changed_when: false