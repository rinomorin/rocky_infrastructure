---
# --- STAGE 0: NETWORK & RESOLUTION PREP ---
# --------------------------------
- name: Enforce IPA DNS Resolution
  become: yes
  block:
    - name: "DNS Prep - Identify Active Interface Name"
      ansible.builtin.shell: "nmcli -t -f NAME connection show --active | head -n 1"
      register: active_conn_name
      changed_when: false

    - name: "DNS Prep - Test SSH Connectivity to Master {{ ipa_master }} @ {{ ipa_master_ip }}"
      # We use wait_for on Port 22 because we know SSH is working
      ansible.builtin.wait_for:
        host: "{{ ipa_master_ip }}"
        port: 22
        timeout: 5
        msg: "Cannot reach Master IP {{ ipa_master_ip }} on Port 22"
      when: ansible_host != ipa_master_ip

    - name: "DNS Prep - Configure DNS via NMCLI Shell"
      # We force 'ipv4.ignore-auto-dns yes' so the node stops using 8.8.8.8
      ansible.builtin.shell: |
        nmcli connection modify "{{ active_conn_name.stdout }}" \
        ipv4.dns "{{ ipa_master_ip }}" \
        ipv4.dns-search "{{ ipa_domain }}" \
        ipv4.ignore-auto-dns yes && \
        nmcli connection up "{{ active_conn_name.stdout }}"
      register: nm_mod
      when: ansible_host != ipa_master_ip

    - name: "DNS Prep - Verify Internal Resolution"
      # Once the DNS is updated, we should be able to resolve the Master's name
      ansible.builtin.command: "nslookup {{ ipa_master_fqdn }}"
      register: resolution_verify
      changed_when: false
      until: resolution_verify.rc == 0
      retries: 3
      delay: 2
      when: nm_mod is changed

  when: 
    - ansible_host != ipa_master_ip
    - ipa_stage == 'unconfigured'

  # --- STAGE 2: DNS INJECTION (PRE-INSTALL) ---
- name: get host zone
  set_fact:
    ipa_zone: "{{ ca_hostname.split('.')[1:] | join('.')}}"
    dom_zone: "{{ ipa_master_host.split('.')[1:] | join('.')}}"

# --- STAGE 3: INSTALLATION LOGIC ---
- name: Check variables
  debug:
    msg: |
      ipa_dm_password {{ ipa_dm_password }}
      ipa_admin_password {{ ipa_admin_password }}
      ipa_master {{ ipa_master }}
      ipa_master_ip {{ ipa_master_ip }}
      ca_hostname {{ ca_hostname }}
      ipa_domain {{ ipa_domain }}
      ipa_realm {{ ipa_realm }}

- name: Pre-Install - Ensure Entropy and Certmonger
  become: yes
  ansible.builtin.shell: |
    systemctl restart certmonger
    # Ensure haveged or rng-tools is running if available to prevent entropy hang
    systemctl start rngd || true 
  when: ipa_stage == 'unconfigured'

