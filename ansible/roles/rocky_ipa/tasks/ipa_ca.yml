---
# --- STAGE 0: NETWORK & RESOLUTION PREP ---
- name: Enforce IPA DNS Resolution
  become: yes
  block:
    - name: "DNS Prep - Test Master DNS Response"
      # We test if the MASTER is responding to DNS queries before we switch
      ansible.builtin.command: "nslookup {{ ipa_master }} {{ ipa_master_ip }}"
      register: dns_test
      changed_when: false
      ignore_errors: yes

    - name: DNS Prep - Set Persistent DNS via nmcli
      community.general.nmcli:
        conn_name: "Wired connection 1"
        # Use dns4 and dns4_search for IPv4 compatibility
        dns4:
          - "{{ ipa_master_ip }}"
        dns4_search:
          - "{{ ipa_domain }}"
        state: present
      register: nmcli_update

    - name: DNS Prep - Apply Network Changes
      ansible.builtin.shell: "nmcli connection up 'Wired connection 1' && systemctl restart NetworkManager"
      when: nmcli_update is changed

    # --- STAGE 2: DNS INJECTION (PRE-INSTALL) ---
    - name: Ensure DNS Records exist for installation
      # This runs ON the master to add the replica's record
      ansible.builtin.shell: |
        echo '{{ ipa_admin_password }}' | kinit admin && \
        ipa dnsrecord-add {{ ipa_domain }} {{ inventory_hostname.split('.')[0] }} --a-rec={{ ansible_host }}
      delegate_to: "{{ ipa_master_ip }}"
      register: dns_injection_out
      failed_when: 
        - dns_injection_out.rc != 0 
        - "'already exists' not in dns_injection_out.stderr"
      no_log: true
      
  # Matches your discovery facts for helper, ipa02, etc.
  when: ipa_type in ['member', 'client', 'replica'] and ipa_stage == 'unconfigured'

# --- STAGE 1: PRE-FLIGHT VALIDATION ---
- name: Verify Environment Readiness
  block:
    - name: "Replica: Validate Connectivity to Primary Master (via IP)"
      ansible.builtin.wait_for:
        host: "{{ ipa_master_ip }}" # Using IP as per your request
        port: "{{ item.port }}"
        timeout: 10
        msg: "Cannot reach Primary IPA on port {{ item.port }} ({{ item.name }})"
      loop:
        - { name: 'LDAP', port: 389 }
        - { name: 'LDAPS', port: 636 }
        - { name: 'Kerberos KDC', port: 88 }
        - { name: 'Dogtag/HTTPS', port: 443 }
      when: ipa_role == 'member'

    - name: "Replica: Check Dogtag (PKI) Service Status (via FQDN)"
      ansible.builtin.uri:
        url: "https://{{ ipa_master }}/ca/ee/ca/checkStatus" # Testing DNS here
        validate_certs: no
        status_code: 200
      register: dogtag_check
      when: ipa_role == 'member'

  when: ipa_stage == 'unconfigured'

# --- STAGE 2: DNS INJECTION (PRE-INSTALL) ---
- name: Ensure DNS Records exist for installation
  ansible.builtin.command: >
    ipa dnsrecord-add {{ ipa_domain }} {{ inventory_hostname_short }} --a-rec={{ ansible_host }}
  delegate_to: "{{ ipa_master }}"
  remote_user: admin
  when: 
    - ipa_role == 'replica'
    - ipa_stage == 'unconfigured'
  failed_when: false # Prevent failure if record already exists

# --- STAGE 3: INSTALLATION LOGIC ---
- name: Check variables
  debug:
    msg: |
      ipa_dm_password {{ ipa_dm_password }}
      ipa_admin_password {{ ipa_admin_password }}
      ipa_master {{ ipa_master }}
      ipa_master_ip {{ ipa_master_ip }}
      ca_hostname {{ ca_hostname }}
      ipa_domain {{ ipa_domain }}
      ipa_realm {{ ipa_realm }}

- name: Pre-Install - Ensure Entropy and Certmonger
  become: yes
  ansible.builtin.shell: |
    systemctl restart certmonger
    # Ensure haveged or rng-tools is running if available to prevent entropy hang
    systemctl start rngd || true 
  when: ipa_stage == 'unconfigured'

- name: Configure IPA CA server (Initial Build)
  become: yes
  environment:
    PKI_TIMEOUT: "600" # Increase timeout to 10 minutes
  ansible.builtin.shell: |
    umask 022 && ipa-server-install \
      --unattended \
      --domain={{ ipa_domain | lower }} \
      --realm={{ ipa_realm }} \
      --ds-password='{{ ipa_dm_password }}' \
      --admin-password='{{ ipa_admin_password }}' \
      --hostname={{ ca_hostname }} \
      --setup-dns \
      --auto-forwarders \
      --auto-reverse \
      --allow-zone-overlap \
      --no-host-dns
  register: ipa_install_out
  when: 
    - ipa_stage == 'unconfigured'
    - ipa_role | default('primary') == 'primary'

- name: Configure IPA Secondary Replica (with CA)
  become: yes
  environment:
    PKI_TIMEOUT: "600"
  ansible.builtin.shell: |
    umask 022 && ipa-replica-install \
      --unattended \
      --principal=admin \
      --admin-password='{{ ipa_admin_password }}' \
      --server={{ ipa_primary_fqdn }} \
      --domain={{ ipa_domain | lower }} \
      --realm={{ ipa_realm }} \
      --hostname={{ ca_hostname }} \
      --setup-ca \
      --setup-dns \
      --no-host-dns
  register: ipa_replica_out
  when: 
    - ipa_stage == 'unconfigured'
    - ipa_role == 'replica'

# --- STAGE 4: RECOVERY & HEALTH VERIFICATION ---
- name: Post-Config / Weekly Health Verification
  block:
    - name: Ensure ca.crt is in system trust
      ansible.builtin.shell: |
        cp /etc/ipa/ca.crt /etc/pki/ca-trust/source/anchors/
        update-ca-trust
      changed_when: false

    - name: Acquire Kerberos ticket for host principal
      command: kinit -kt /etc/krb5.keytab "host/{{ ca_hostname }}@{{ ipa_domain | upper }}"
      changed_when: false

    - name: Audit IPA related services (Systemd)
      ansible.builtin.systemd:
        name: "{{ item }}"
      loop:
        - ipa.service
        - "dirsrv@{{ ipa_domain | upper | replace('.', '-') }}"
        - krb5kdc.service
        - kadmin.service
        - pki-tomcatd@pki-tomcat.service
        - named-pkcs11.service
      register: service_audit

    - name: Validate CA certificate format
      ansible.builtin.command: openssl x509 -in /etc/ipa/ca.crt -noout -text
      changed_when: false

    - name: Test LDAP (389) connectivity
      ansible.builtin.shell: "ldapsearch -x -H ldap://localhost:389 -b \"dc={{ ipa_domain | replace('.', ',dc=') }}\""
      register: ldap_389
      changed_when: false

    - name: Test LDAPS (636) with DM Credentials
      ansible.builtin.shell: |
        ldapsearch -H ldaps://localhost:636 -D "cn=Directory Manager" \
        -w {{ ipa_dm_password }} -b "" -s base "(objectclass=*)"
      no_log: true
      changed_when: false

    - name: Test DNS Resolution (Internal)
      ansible.builtin.shell: "dig +short @127.0.0.1 {{ ca_hostname }}"
      register: dns_test
      failed_when: dns_test.stdout == ""
      changed_when: false

    - name: Verify Kerberos kinit for Admin
      ansible.builtin.expect:
        command: "kinit admin@{{ ipa_domain | upper }}"
        responses:
          '(?i)Password for admin.*': "{{ ipa_admin_password }}"
      no_log: true
      changed_when: false

    # --- DNS DRIFT RECONCILIATION ---
    - name: Ensure Infrastructure DNS Records (Apex & Host)
      ansible.builtin.command: >
        ipa dnsrecord-add {{ ipa_domain }} {{ item.name }} --a-rec={{ item.ip }}
      loop:
        - { name: "{{ ipa_master }}", ip: "{{ ipa_master_ip }}" }
        - { name: "@", ip: "{{ ipa_master_ip }}" }
      register: dns_sync
      failed_when: false
      changed_when: "'added' in dns_sync.stdout"

  # Run verification if we just installed OR if we were already running
  when: ipa_stage in ['running', 'configured'] or (ipa_install_out is defined and not ipa_install_out.failed)

- name: Refresh Discovery Facts
  ansible.builtin.include_tasks: check_status.yml