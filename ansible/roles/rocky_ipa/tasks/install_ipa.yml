- name: Determine Git Remote URL
  set_fact:
    # We use 'this_url' to grab the remote from the local git config
    this_url: "{{ lookup('pipe', 'grep -m1 \"url =\" ' + playbook_dir + '/../../.git/config | cut -d\"=\" -f2 | xargs') }}"
  run_once: true

