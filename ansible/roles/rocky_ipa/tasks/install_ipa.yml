- debug:
    msg: "ipa_install_result: {{ ipa_install_result.changed }}"


- name: Handle Reboot Logic
  become: yes
  block:
    - name: Reboot standard nodes (Wait for them to return)
      ansible.builtin.reboot:
        msg: "Rebooting replica/master nodes"
        reboot_timeout: 600
      when: inventory_hostname != controller_node

    - name: Roboot Alere message
      debug:
        msg: "system rebooting, re-run command but add ipa_continue=1"
      when: inventory_hostname == controller_node

    - name: Fire-and-Forget Reboot for Controller
      # We use a detached shell so the script doesn't hang waiting for a connection that's dying
      ansible.builtin.shell: "nohup bash -c 'sleep 5 && reboot' &"
      async: 1
      poll: 0
      when: inventory_hostname == controller_node

