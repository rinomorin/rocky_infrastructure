# roles/ipa_setup/install.yml
---
- name: Network Prep - Force Temporary DNS
  become: yes
  ansible.builtin.shell: |
    echo "nameserver 8.8.8.8" > /etc/resolv.conf
    echo "nameserver 1.1.1.1" >> /etc/resolv.conf
  changed_when: false

- name: Network Prep - Test Mirror Connectivity
  ansible.builtin.command: curl -I https://mirrors.rockylinux.org
  register: mirror_test
  until: mirror_test.rc == 0
  retries: 3
  delay: 5
  changed_when: false

- name: Enforce FQDN Hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Install IPA packages
  ansible.builtin.package:
    name:
      - ipa-server
      - ipa-server-dns
      - python3-pexpect
    state: present
  register: ipa_install_result
  # ... rest of your when logic ...

- name: Enforce FQDN Hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Install IPA packages
  ansible.builtin.package:
    name:
      - ipa-server
      - ipa-server-dns
      - python3-pexpect
    state: present
  register: ipa_install_result  
  when: 
    - ipa_stage == 'required'
    - ipa_type in ('primary', 'master', 'member', 'replica', 'client')

- name: Enable FIPS on k8s server
  become: true
  block:
    - name: Check if FIPS is enabled
      ansible.builtin.command: /usr/bin/fips-mode-setup --check
      register: fips_check
      changed_when: false

    - name: Enable FIPS mode
      ansible.builtin.command: /usr/bin/fips-mode-setup --enable
      when: "'is enabled' not in fips_check.stdout"
      register: fips_enable
  when: 
    - ipa_type == 'replica'

- name: Ensure IPA install audit directory exists
  file:
    path: /var/log/ipa_install_status
    state: directory
    mode: '0755'
  
- name: Ensure IPA install audit directory exists
  file:
    path: /var/log/ipa_version
    state: directory
    mode: '0755'
  
- name: Configure firewall for IPA
  become: true
  ansible.builtin.shell: |
    firewall-cmd --set-default-zone=drop && \
    firewall-cmd --permanent --zone=drop \
      --add-service=http \
      --add-service=https \
      --add-service=dns \
      --add-service=dns-over-tls \
      --add-service=ldap \
      --add-service=ldaps \
      --add-service=kerberos \
      --add-service=ssh \
      --add-service=ntp && \
    firewall-cmd --permanent --zone=drop \
      --add-port=80/tcp \
      --add-port=443/tcp \
      --add-port=53/tcp \
      --add-port=53/udp \
      --add-port=88/tcp \
      --add-port=88/udp \
      --add-port=123/udp \
      --add-port=389/tcp \
      --add-port=636/tcp \
      --add-port=464/tcp \
      --add-port=464/udp \
      --add-port=8443/tcp \
      --add-port=8080/tcp \
      --add-port=3268/tcp \
      --add-port=3269/tcp && \
    firewall-cmd --reload

