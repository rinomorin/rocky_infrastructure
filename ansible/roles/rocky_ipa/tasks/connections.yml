---

- name: Network Prep - Conditional Temporary DNS
  become: yes
  ansible.builtin.shell: |
    # 1. Check for localhost DNS
    if grep -q "127.0.0.1" /etc/resolv.conf; then
        if command -v ipactl >/dev/null 2>&1 && ipactl status >/dev/null 2>&1; then
            echo "Local IPA is alive. No change needed."
            exit 0
        fi
    fi

    # 2. Check for Master IP DNS
    MASTER_IP="{{ hostvars[item]['ansible_host'] | default(ipa_master_ip) }}"
    if grep -q "$MASTER_IP" /etc/resolv.conf; then
        # Check if we have 'host' or 'nc' to verify the Master
        if command -v host >/dev/null 2>&1; then
            if host -W 1 "$MASTER_IP" "$MASTER_IP" >/dev/null 2>&1; then
                echo "Master DNS is resolving. No change needed."
                exit 0
            fi
        elif command -v nc >/dev/null 2>&1; then
            if nc -z -w 2 "$MASTER_IP" 53 >/dev/null 2>&1; then
                echo "Master port 53 is reachable via nc. No change needed."
                exit 0
            fi
        fi
    fi

    # 3. Fallback Check: Is Google already there?
    if grep -q "8.8.8.8" /etc/resolv.conf; then
        echo "8.8.8.8 already present. No change needed."
        exit 0
    fi

    # 4. If we reached here, tools are missing or Master is unreachable
    echo "nameserver 8.8.8.8" > /etc/resolv.conf
    echo "nameserver 1.1.1.1" >> /etc/resolv.conf
    echo "Updated resolv.conf with temporary DNS to allow tool installation"
  register: dns_update_result
  changed_when: "'Updated' in dns_update_result.stdout"
  delegate_to: "{{ item }}"
  loop: "{{ groups['ipa'] }}"

- name: Ensure DNS lookup utilities are installed on all IPA nodes
  ansible.builtin.package:
    name: bind-utils
    state: present
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['ipa'] }}"

- name: Set  hostname
  shell: >
    hostnamectl set-hostname {{ hostvars[inventory_hostname].hostname }}
  register: set_hostname
  changed_when: false

- name: Allow IPA services in the drop zone
  ansible.posix.firewalld:
    zone: drop
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  become: true
  loop:
    - http
    - https
    - dns
    - dns-over-tls
    - ldap
    - ldaps
    - kerberos
    - ssh
    - ntp

- name: Allow specific IPA ports in the drop zone
  ansible.posix.firewalld:
    zone: drop
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  become: true
  loop:
    - 80/tcp
    - 443/tcp
    - 53/tcp
    - 53/udp
    - 88/tcp
    - 88/udp
    - 123/udp
    - 389/tcp
    - 636/tcp
    - 464/tcp
    - 464/udp
    - 8443/tcp
    - 8080/tcp
    - 3268/tcp
    - 3269/tcp

- name: Set default firewall zone to drop
  ansible.builtin.command: firewall-cmd --set-default-zone=drop
  become: true
  # Only run this if the default zone isn't already drop
  register: zone_check
  changed_when: "'drop' not in zone_check.stdout"
  # We check the current default first
  check_mode: false
  
# Optional: Verify the active zone is indeed drop
- name: Verify active default zone
  ansible.builtin.command: firewall-cmd --get-default-zone
  register: active_zone
  changed_when: false
  failed_when: "'drop' not in active_zone.stdout"

- name: Test connectivity from local to Helper
  shell: >
    whoami && hostname
  register: whoami
  changed_when: false

- name: Test connectivity from Helper to local results
  debug:
    var: whoami.stdout


