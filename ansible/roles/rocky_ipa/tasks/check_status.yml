- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Check for IPA configuration file
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_conf_file

- name: Check IPA service status
  ansible.builtin.command: "ipactl status"
  register: ipa_service_check
  failed_when: false
  changed_when: false

- name: "Stage 1: Required (Fresh Plate)"
  ansible.builtin.set_fact:
    ipa_stage: "required"
  when: "'ipa-server' not in ansible_facts.packages"

- name: "Stage 2: Unconfigured"
  ansible.builtin.set_fact:
    ipa_stage: "unconfigured"
  when: 
    - "'ipa-server' in ansible_facts.packages"
    - not ipa_conf_file.stat.exists

- name: "Stage 3: Configured"
  ansible.builtin.set_fact:
    ipa_stage: "configured"
  when: 
    - ipa_conf_file.stat.exists
    - ipa_service_check.rc != 0

- name: "Stage 4: Running"
  ansible.builtin.set_fact:
    ipa_stage: "running"
  when: 
    - ipa_conf_file.stat.exists
    - ipa_service_check.rc == 0