# role/ipa_setup/defaults/main.yml
ipa_stat: "initial"
is_ipa_pkg: False
ipa_type: "{{ hostvars[inventory_hostname]['ipa_cluster_role'] | default('client') }}"
ipa_master_host: "{{ groups['ipa'][0] }}"
ipa_master: "{{ hostvars[ipa_master_host]['inventory_hostname'] }}"
ipa_master_ip: "{{ hostvars[ipa_master_host]['ansible_host'] }}"
ipa_primary_fqdn: "{{ hostvars[ipa_master_host]['hostname'] }}"
ipa_role: "{{ ipa_type }}"
ipa_hostname: "{{ ansible_fqdn }}"
ipa_setup_dns: true
ipa_setup_ca: true       # Set false for replica unless promoting CA
ipa_mkhomedir: true
ipa_no_forwarders: true
ipa_no_ntp: true
ipa_no_hbac_allow: true
ipa_ca_intermediate: "{{ groups['ca_intermediate'][0] }}"
ipa_ca_intermediate_ip: "{{ hostvars[groups['ca_intermediate'][0]].ansible_host }}"
ipa_helper: "{{ groups['helpers'][0] }}"
ipa_helper_ip: "{{ hostvars[groups['helpers'][0]].ansible_host }}"
