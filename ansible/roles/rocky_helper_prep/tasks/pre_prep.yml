# get my id_rsa.pub. 
- name: "Discover IP for {{ Orchestrator_host }}"
  become: true
  shell: |
    virsh domifaddr {{ Orchestrator_host.split('.')[0] }} --source agent 2>/dev/null | \
    grep -Evi "lo|ipv6|Name|---" | \
    grep -oP '(\d{1,3}\.){3}\d{1,3}' | head -n 1
  register: live_guest_ip_out
  changed_when: false
  
- name: Set target IP fact
  set_fact:
    target_ip: "{{ live_guest_ip_out.stdout }}"

- name: Set key as a fact
  delegate_to: localhost
  become: false
  set_fact:
    my_public_key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

- name: Set key as a fact
  become: false
  ansible.builtin.shell:
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i .ssh/id_rsa {{ Orchestrator_user }}@{{ target_ip }} "
      if grep "my_public_key" ~/.ssh/authorized_keys; then 
        echo "key already exists"; 
      else
        echo "{{ my_public_key }}" >> ~/.ssh/authorized_keys;
      fi
    "