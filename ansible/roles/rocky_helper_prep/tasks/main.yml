---
# tasks/main.yml
- name: Load existing deployment data
  include_vars:
    file: "{{ deployment_report_path }}"
    name: guest_configs

# - name: Gather local info  
#   include_tasks: pre_prep.yml

- name: Discover Orchestrator IP
  become: yes
  shell: |
    virsh domifaddr {{ Orchestrator_host }} --source agent 2>/dev/null | \
    grep -Evi "lo|ipv6|Name|---" | \
    grep -oP '(\d{1,3}\.){3}\d{1,3}' | head -n 1
  register: orchestrator_ip_out
  changed_when: false

- name: Set Orchestrator Fact
  set_fact:
    helper_ip: "{{ orchestrator_ip_out.stdout }}"

- name: Setup SSH Trust
  include_tasks: 01_prep_nodes_ssh.yml
  loop: "{{ target_guests }}"
  loop_control:
        loop_var: guest_member

- name: Build Python Environment
  import_tasks: 02_prep_helper_python.yml

# - name: Verify Orchestrator
#   import_tasks: 03_verify_orchestrator.yml