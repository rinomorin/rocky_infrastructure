---
- name: "Bootstrap Controller and Check Network"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: "Check if IPA Master DNS is reachable (Internal Network Check)"
      ansible.builtin.wait_for:
        host: "192.168.100.10" # Generic master IP
        port: 53
        timeout: 2
      register: internal_dns_check
      # We don't want the play to stop if it times out
      failed_when: 
        - internal_dns_check.failed is defined
        - "{{ 'Timeout when waiting' not in internal_dns_check.msg }}"

    - name: Ensure latest stable collections are installed on controller
      community.general.ansible_galaxy_install:
        type: collection
        name: "{{ item }}"
        state: latest  # This replaces 'upgrade: yes'
      loop:
        - community.general
        - ansible.posix
        - kubernetes.core
      # If the network check TIMED OUT (failed), we run this to hit the internet.
      # If the check PASSED (internal DNS found), we skip this to avoid network errors.
      when: internal_dns_check.failed 
      ignore_errors: yes

