- name: Ensure latest stable collections are installed on controller
  delegate_to: localhost
  run_once: true
  community.general.ansible_galaxy_install:
    name: "{{ item }}"
    upgrade: yes
  loop:
    - community.general
    - ansible.posix
    - kubernetes.core
  when: 
    - (hostvars['helper']['ipa_stage'] is not defined) or 
      (hostvars['helper']['ipa_stage'] == 'unconfigured')
  ignore_errors: yes

- name: Configure IPA Infrastructure
  hosts: ipa_servers:helpers
  gather_facts: true
  serial: 1
  roles:
    - role: rocky_ipa
  

  