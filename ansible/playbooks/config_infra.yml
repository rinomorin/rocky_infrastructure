---
- name: "Bootstrap Controller and Check Network"
  hosts: localhost
  connection: local
  gather_facts: False
  tasks:
    - name: "Check if IPA Master DNS is reachable (Internal Network Check)"
      ansible.builtin.wait_for:
        host: "192.168.100.10"
        port: 53
        timeout: 2
      register: internal_dns_check
      # This keeps the task GREEN (Success)
      failed_when: false 

    - name: "Set Internal Status Fact"
      ansible.builtin.set_fact:
        # We are 'offline' from Galaxy if the timeout message is present
        is_internal_only: "{{ 'Timeout' in internal_dns_check.msg | default('') }}"

    - name: Ensure latest stable collections are installed on controller
      delegate_to: localhost
      become: false
      run_once: true
      command: "ansible-galaxy collection install {{ item }} --upgrade"
      loop:
        - community.general
        - ansible.posix
        - kubernetes.core  # Highly recommended for your FCOS/K8s work
      changed_when: false # These commands check for updates every time
      when: is_internal_only

- name: Configure IPA Infrastructure
  hosts: ipa_servers:helpers
  gather_facts: true
  serial: 1
  roles:
    - role: rocky_ipa
  

  