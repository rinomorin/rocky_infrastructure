- name: set ipa servers
  hosts: ipa_servers
  become: true
  gather_facts: yes
  tasks:
    - name: Deploy IPA Servers
      include_role:
        - name: rocky_ipa
      loop: ipa_severs
      loop_control: "guest_member"
