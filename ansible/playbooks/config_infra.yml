- name: "Check if IPA is already configured (prevents Galaxy timeout)"
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_installed_check
  delegate_to: localhost

- name: Ensure latest stable collections are installed on controller
  delegate_to: localhost
  run_once: true
  community.general.ansible_galaxy_install:
    name: "{{ item }}"
    upgrade: yes
  loop:
    - community.general
    - ansible.posix
    - kubernetes.core
  # Skip ONLY if the IPA config file already exists
  when: not ipa_installed_check.stat.exists
  ignore_errors: yes

- name: Configure IPA Infrastructure
  hosts: ipa_servers:helpers
  gather_facts: true
  serial: 1
  roles:
    - role: rocky_ipa
  

  